name: CI Pipeline - Validação de Testes

on:
  push:
    branches: [ main, feature/testes-e-ci ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Instalar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes automatizados (Vitest)
        run: npm run test

      - name: Verificar compilação do projeto (Build)
        run: npm run build
